name: Publish Fork Image to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set image metadata
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          short_sha="${GITHUB_SHA::12}"
          echo "IMAGE_NAME=ghcr.io/${owner}/splitpro" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${short_sha}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=fork-main
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA }}

  deploy:
    name: Deploy image to server
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main'

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/home/ubuntu/split-pro' }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

    steps:
      - name: Configure SSH
        run: |
          if [[ -z "$DEPLOY_HOST" || -z "$DEPLOY_SSH_KEY" || -z "$DEPLOY_USER" ]]; then
            echo "Missing one of required secrets: DEPLOY_HOST, DEPLOY_SSH_KEY, DEPLOY_USER" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Pull and restart SplitPro
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" <<EOF
            set -eu
            cd "$DEPLOY_PATH"
            docker compose pull splitpro
            docker compose up -d splitpro
            docker compose ps splitpro
          EOF
